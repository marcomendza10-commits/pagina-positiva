<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página Positiva</title>

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#cfe9ff,#d4f7d4,#fff3c4);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
text-align:center;
}

.container{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
max-width:500px;
width:90%;
}

h1{
color:#3a7bd5;
}

#contador{
font-size:18px;
margin-bottom:10px;
}

#mensaje{
font-size:22px;
font-weight:bold;
margin:20px 0;
opacity:0;
transform:translateY(10px);
transition:all 0.5s ease;
}

#mensaje.show{
opacity:1;
transform:translateY(0);
}

img{
max-width:100%;
height:auto;
border-radius:10px;
margin-top:10px;
}

button{
margin:10px;
padding:10px 20px;
border:none;
border-radius:8px;
font-size:15px;
cursor:pointer;
}

#nuevo{
background:#3a7bd5;
color:white;
}

#like{
background:#4CAF50;
color:white;
}

#dislike{
background:#ff5252;
color:white;
}

.stats{
margin-top:15px;
font-size:16px;
}

</style>
</head>

<body>

<div class="container">

<h1>✨ Un momento positivo ✨</h1>

<div id="contador"></div>

<div id="mensaje"></div>

<img id="gif" src="">

<div>

<button id="nuevo" onclick="nuevoMensaje()">Otro mensaje</button>

</div>

<div>

<button id="like" onclick="votar(true)">👍 Me gustó</button>
<button id="dislike" onclick="votar(false)">👎 No me gustó</button>

</div>

<div class="stats">

👍 Me gustó: <span id="likes">0</span>  
<br>
👎 No me gustó: <span id="dislikes">0</span>

</div>

</div>

<script>

/* CONTADOR DE VISITAS */

let visitas = localStorage.getItem("visitas") || 0;
visitas++;
localStorage.setItem("visitas", visitas);

document.getElementById("contador").innerText =
"Visitas a esta página: " + visitas;


/* CONTADORES DE VOTOS */

let likes = localStorage.getItem("likes") || 0;
let dislikes = localStorage.getItem("dislikes") || 0;

document.getElementById("likes").innerText = likes;
document.getElementById("dislikes").innerText = dislikes;


/* MENSAJES */

const mensajes = [

"Hoy es un buen día para empezar algo nuevo.",
"Eres más capaz de lo que imaginas.",
"Pequeños pasos también son progreso.",
"Cada día trae nuevas oportunidades.",
"Tu esfuerzo valdrá la pena.",
"No te rindas, lo mejor puede estar cerca.",
"La constancia vence al talento.",
"Respira profundo, todo estará bien.",
"Tu actitud puede cambiar tu día.",
"Cada reto te hace más fuerte.",
"Confía en tu proceso.",
"Siempre hay algo bueno por venir.",
"La perseverancia crea resultados.",
"Hoy puedes lograr algo increíble.",
"Tu energía positiva contagia al mundo.",
"Las grandes cosas comienzan con pequeños pasos.",
"Cree en ti y en tu camino.",
"Todo progreso cuenta.",
"La felicidad también se entrena.",
"Hoy puede ser tu mejor día."

];


/* GIFS */

const gifs = [

"cat-hello.gif",
"d86abf5e9e32b89298731f39f283582c.gif",
"happy-happy-happy-cat.gif"

];


/* GENERAR MENSAJE */

function nuevoMensaje(){

const mensaje = mensajes[Math.floor(Math.random()*mensajes.length)];
const gif = gifs[Math.floor(Math.random()*gifs.length)];

const mensajeElemento = document.getElementById("mensaje");

mensajeElemento.classList.remove("show");

setTimeout(()=>{

mensajeElemento.innerText = mensaje;
mensajeElemento.classList.add("show");

},100);

document.getElementById("gif").src = gif;

}


/* VOTACIÓN */

function votar(gusto){

if(gusto){

likes++;
localStorage.setItem("likes",likes);
document.getElementById("likes").innerText = likes;

}else{

dislikes++;
localStorage.setItem("dislikes",dislikes);
document.getElementById("dislikes").innerText = dislikes;

}

}


/* CARGA INICIAL */

nuevoMensaje();

</script>

</body>
</html>
